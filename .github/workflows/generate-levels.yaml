name: Generate Game Levels
run-name: Generate ${{ inputs.game }} levels (${{ inputs.from_date }} to ${{ inputs.to_date }})

on:
  workflow_dispatch:
    inputs:
      game:
        description: 'Select Game'
        required: true
        type: choice
        default: 'neon-protocol'
        options:
          - symbiomes
          - neon-protocol
      
      from_date:
        description: 'Start date (YYYY-MM-DD)'
        required: true
        default: '2025-11-01'
      
      to_date:
        description: 'End date (YYYY-MM-DD)'
        required: true
        default: '2025-11-01'

      # Symbiomes Specific
      difficulty:
        description: '[Symbiomes Only] Difficulty'
        type: choice
        required: false
        default: 'hard'
        options:
          - easy
          - medium
          - hard
          - expert

      # Neon Protocol Specific
      neon_mode:
        description: '[Neon Protocol Only] Mode'
        type: choice
        required: false
        default: 'random'
        options:
          - standard
          - glitched
          - random

      neon_digits:
        description: '[Neon Protocol Only] Digits'
        type: choice
        required: false
        default: 'random'
        options:
          - "3"
          - "4"
          - "5"    
          - random  

permissions:
  contents: write

jobs:
  generate-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate Level JSONs
        run: |
          # --- CONFIGURATION SWITCHER ---
          GAME="${{ inputs.game }}"
          START_DATE="${{ inputs.from_date }}"
          END_DATE="${{ inputs.to_date }}"
          
          if [[ "$GAME" == "symbiomes" ]]; then
            echo "Configuring for Symbiomes..."
            OUTPUT_DIR="public/assets/symbiomes/levels"
            JAR_FILE="tools/symbiomes-level-generator.jar"
            # Pass difficulty as argument
            JAR_ARGS="${{ inputs.difficulty }}" 
            
          elif [[ "$GAME" == "neon-protocol" ]]; then
            echo "Configuring for Neon Protocol..."
            OUTPUT_DIR="public/assets/neon-protocol/levels"
            JAR_FILE="tools/neon-protocol-level-generator.jar"
            # Pass mode (standard/glitched) as argument
            JAR_ARGS="${{ inputs.neon_mode }} ${{ inputs.neon_digits }}"
          fi

          echo "--------------------------------"
          echo "Target Directory: $OUTPUT_DIR"
          echo "Using JAR: $JAR_FILE"
          echo "Arguments: $JAR_ARGS"
          echo "--------------------------------"

          # Ensure directory exists
          mkdir -p "$OUTPUT_DIR"
          
          # Initialize iterator
          CURRENT="$START_DATE"

          # Loop dates
          while [[ "$CURRENT" < "$END_DATE" ]] || [[ "$CURRENT" == "$END_DATE" ]]; do
          
            # Format filename as DD.MM.YYYY.json
            FILENAME_DATE=$(date -d "$CURRENT" +'%d.%m.%Y')
            TARGET_FILE="${OUTPUT_DIR}/${FILENAME_DATE}.json"
            
            echo "Generating $GAME level for: $FILENAME_DATE"
            
            # Execute Java JAR with the specific arguments
            # We explicitly pass JAR_ARGS here
            java -jar "$JAR_FILE" $JAR_ARGS > "$TARGET_FILE"
            
            # Increment date
            CURRENT=$(date -I -d "$CURRENT + 1 day")
          done

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Add whichever folder was modified
          git add public/assets/symbiomes/levels/*.json || true
          git add public/assets/neon-protocol/levels/*.json || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Generate $GAME levels ($JAR_ARGS): ${{ inputs.from_date }} to ${{ inputs.to_date }}"
            git push
          fi