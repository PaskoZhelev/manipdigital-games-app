name: Generate Game Levels
run-name: Generate ${{ inputs.game }} levels (${{ inputs.from_date }} to ${{ inputs.to_date }})

on:
  workflow_dispatch:
    inputs:
      game:
        description: 'Select Game'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - symbiomes
          - neon-protocol
          - logic-gems
      
      from_date:
        description: 'Start date (YYYY-MM-DD)'
        required: true
        default: '2025-11-01'
      
      to_date:
        description: 'End date (YYYY-MM-DD)'
        required: true
        default: '2025-11-01'

      # Symbiomes Specific
      difficulty:
        description: '[Symbiomes Only] Difficulty'
        type: choice
        required: false
        default: 'random'
        options:
          - easy
          - medium
          - hard
          - expert
          - random

      # Neon Protocol Specific
      neon_mode:
        description: '[Neon Protocol Only] Mode'
        type: choice
        required: false
        default: 'random'
        options:
          - standard
          - glitched
          - random

      neon_digits:
        description: '[Neon Protocol Only] Digits'
        type: choice
        required: false
        default: 'random'
        options:
          - "3"
          - "4"
          - "5"    
          - random  

permissions:
  contents: write

jobs:
  generate-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate Level JSONs
        run: |
          # --- INPUTS ---
          SELECTED_GAME="${{ inputs.game }}"
          START_DATE="${{ inputs.from_date }}"
          END_DATE="${{ inputs.to_date }}"
          
          # Define which games to run based on input
          if [[ "$SELECTED_GAME" == "all" ]]; then
            GAMES_TO_RUN="symbiomes neon-protocol logic-gems"
          else
            GAMES_TO_RUN="$SELECTED_GAME"
          fi
          
          # Initialize Date Iterator
          CURRENT="$START_DATE"

          # --- MAIN LOOP (Date -> Game) ---
          while [[ "$CURRENT" < "$END_DATE" ]] || [[ "$CURRENT" == "$END_DATE" ]]; do
            
            # Format filename as DD.MM.YYYY.json
            FILENAME_DATE=$(date -d "$CURRENT" +'%d.%m.%Y')
            
            # Loop through selected games for this specific date
            for GAME in $GAMES_TO_RUN; do
            
              # Reset variables
              OUTPUT_DIR=""
              JAR_FILE=""
              JAR_ARGS=""

              # Configure Game Specifics
              if [[ "$GAME" == "symbiomes" ]]; then
                OUTPUT_DIR="public/assets/symbiomes/levels"
                JAR_FILE="tools/symbiomes-level-generator.jar"
                JAR_ARGS="${{ inputs.difficulty }}" 
                
              elif [[ "$GAME" == "neon-protocol" ]]; then
                OUTPUT_DIR="public/assets/neon-protocol/levels"
                JAR_FILE="tools/neon-protocol-level-generator.jar"
                JAR_ARGS="${{ inputs.neon_mode }} ${{ inputs.neon_digits }}"
                
              elif [[ "$GAME" == "logic-gems" ]]; then
                OUTPUT_DIR="public/assets/logic-gems/levels"
                JAR_FILE="tools/logic-gems-level-generator.jar"
                JAR_ARGS="" # No options for Logic Gems yet
              fi

              # Ensure directory exists
              mkdir -p "$OUTPUT_DIR"
              
              TARGET_FILE="${OUTPUT_DIR}/${FILENAME_DATE}.json"
              
              echo "Generating [$GAME] for $FILENAME_DATE..."
              # echo "Debug: java -jar $JAR_FILE $JAR_ARGS > $TARGET_FILE"

              # Execute Generator
              java -jar "$JAR_FILE" $JAR_ARGS > "$TARGET_FILE"
              
            done
            
            # Increment date
            CURRENT=$(date -I -d "$CURRENT + 1 day")
          done

      - name: Commit and Push
        run: |
          GAME_INPUT="${{ inputs.game }}"
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Add generated files for all potential games
          git add public/assets/symbiomes/levels/*.json || true
          git add public/assets/neon-protocol/levels/*.json || true
          git add public/assets/logic-gems/levels/*.json || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Generate levels ($GAME_INPUT): ${{ inputs.from_date }} to ${{ inputs.to_date }}"
            git push
          fi