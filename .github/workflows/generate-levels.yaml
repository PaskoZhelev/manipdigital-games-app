name: Generate Game Levels
run-name: Generate ${{ inputs.game }} levels (${{ inputs.month }} ${{ inputs.year }})

on:
  workflow_dispatch:
    inputs:
      game:
        description: 'Select Game'
        required: true
        type: choice
        default: 'symbiomes'
        options:
          - symbiomes
          - neon-protocol
          - logic-gems
      
      month:
        description: 'Month'
        required: true
        type: choice
        default: 'january'
        options:
          - january
          - february
          - march
          - april
          - may
          - june
          - july
          - august
          - september
          - october
          - november
          - december
      
      year:
        description: 'Year'
        required: true
        default: '2026'
        type: string

permissions:
  contents: write

jobs:
  generate-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate Level JSON
        run: |
          # --- INPUTS ---
          GAME="${{ inputs.game }}"
          MONTH_NAME="${{ inputs.month }}"
          YEAR="${{ inputs.year }}"
          
          # Convert Month Name to Number for Filename
          case "$MONTH_NAME" in
            "january")   MONTH_NUM="1" ;;
            "february")  MONTH_NUM="2" ;;
            "march")     MONTH_NUM="3" ;;
            "april")     MONTH_NUM="4" ;;
            "may")       MONTH_NUM="5" ;;
            "june")      MONTH_NUM="6" ;;
            "july")      MONTH_NUM="7" ;;
            "august")    MONTH_NUM="8" ;;
            "september") MONTH_NUM="9" ;;
            "october")   MONTH_NUM="10" ;;
            "november")  MONTH_NUM="11" ;;
            "december")  MONTH_NUM="12" ;;
          esac

          # Define Output Directory
          OUTPUT_DIR="public/assets/${GAME}/levels"
          
          # Define Output Filename as MM.YYYY.json
          TARGET_FILE="${OUTPUT_DIR}/${MONTH_NUM}.${YEAR}.json"
          
          JAR_FILE="tools/manip-games-level-generator.jar"

          echo "Generating levels..."
          echo "Game: $GAME"
          echo "Args: $MONTH_NAME $YEAR"
          echo "File: $TARGET_FILE"

          mkdir -p "$OUTPUT_DIR"
          
          # Execute Generator
          # Arguments passed to JAR: Game Name, Month Name, Year
          # Output redirected to file: MM.YYYY.json
          java -Xmx2G -jar "$JAR_FILE" "$GAME" "$MONTH_NAME" "$YEAR" > "$TARGET_FILE"
          
          # Export variables for the next step to use
          echo "GENERATED_FILE=$TARGET_FILE" >> $GITHUB_ENV

      - name: Commit and Push
        run: |
          GAME="${{ inputs.game }}"
          MONTH="${{ inputs.month }}"
          YEAR="${{ inputs.year }}"
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Add the specific generated file (using the env var from previous step)
          git add "$GENERATED_FILE"
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Generate levels ($GAME): $MONTH $YEAR"
            git push
          fi