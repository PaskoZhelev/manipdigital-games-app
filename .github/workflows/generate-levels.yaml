name: Generate Game Levels
run-name: Generate ${{ inputs.game }} levels (${{ inputs.month }} ${{ inputs.year }})

on:
  workflow_dispatch:
    inputs:
      game:
        description: 'Select Game'
        required: true
        type: choice
        default: 'symbiomes'
        options:
          - symbiomes
          - neon-protocol
          - logic-gems
          - all # Added "all" option
      
      month:
        description: 'Month'
        required: true
        type: choice
        default: 'january'
        options:
          - january
          - february
          - march
          - april
          - may
          - june
          - july
          - august
          - september
          - october
          - november
          - december
      
      year:
        description: 'Year'
        required: true
        default: '2026'
        type: string

permissions:
  contents: write

jobs:
  generate-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate Level JSON
        run: |
          # --- INPUTS ---
          INPUT_GAME="${{ inputs.game }}"
          MONTH_NAME="${{ inputs.month }}"
          YEAR="${{ inputs.year }}"
          
          # Convert Month Name to Number for Filename
          case "$MONTH_NAME" in
            "january")   MONTH_NUM="1" ;;
            "february")  MONTH_NUM="2" ;;
            "march")     MONTH_NUM="3" ;;
            "april")     MONTH_NUM="4" ;;
            "may")       MONTH_NUM="5" ;;
            "june")      MONTH_NUM="6" ;;
            "july")      MONTH_NUM="7" ;;
            "august")    MONTH_NUM="8" ;;
            "september") MONTH_NUM="9" ;;
            "october")   MONTH_NUM="10" ;;
            "november")  MONTH_NUM="11" ;;
            "december")  MONTH_NUM="12" ;;
          esac

          # Export MONTH_NUM for the next step to use
          echo "MONTH_NUM=$MONTH_NUM" >> $GITHUB_ENV

          # Determine which games to run
          if [ "$INPUT_GAME" == "all" ]; then
            GAMES_LIST="symbiomes neon-protocol logic-gems"
          else
            GAMES_LIST="$INPUT_GAME"
          fi
          
          JAR_FILE="tools/manip-games-level-generator.jar"

          # Loop through selected games
          for GAME in $GAMES_LIST; do
            echo "----------------------------------------"
            echo "Generating levels for: $GAME"
            
            # Define Output Directory
            OUTPUT_DIR="public/assets/${GAME}/levels"
            
            # Define Output Filename as MM.YYYY.json
            TARGET_FILE="${OUTPUT_DIR}/${MONTH_NUM}.${YEAR}.json"
            
            echo "Args: $MONTH_NAME $YEAR"
            echo "File: $TARGET_FILE"

            mkdir -p "$OUTPUT_DIR"
            
            # Execute Generator
            java -Xmx2G -jar "$JAR_FILE" "$GAME" "$MONTH_NAME" "$YEAR" > "$TARGET_FILE"
          done

      - name: Commit and Push
        run: |
          GAME="${{ inputs.game }}"
          MONTH="${{ inputs.month }}"
          YEAR="${{ inputs.year }}"
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Add generated files using wildcard to catch all games (MM.YYYY.json)
          # We use the MONTH_NUM env var exported from the previous step
          git add public/assets/*/levels/${MONTH_NUM}.${YEAR}.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Generate levels ($GAME): $MONTH $YEAR"
            git push
          fi