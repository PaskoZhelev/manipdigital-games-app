server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Handle requests to /games/app/
    location /games/app/ {
        # Remove the /games/app prefix when looking for files
        alias /usr/share/nginx/html/;
        
        # Try to serve the file directly, then try as directory, finally fallback to index.html
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}