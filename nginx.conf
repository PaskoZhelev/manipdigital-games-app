server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve files for the subpath. If not found, serve the subpath index.html.
    location /games/app/ {
        try_files $uri $uri/ /games/app/index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}