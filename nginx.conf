server {
    listen 80;

    # Set the root for Nginx to look for files (the /usr/share/nginx/html directory)
    root /usr/share/nginx/html;
    index index.html;

    # This location block handles all requests starting with /games/app/
    location /games/app/ {
        
        # Rewrite the URL internally to strip /games/app/ and append /index.html if needed.
        # This is the single most important line. It tells Nginx that everything
        # after /games/app/ should be served from the root of the static files.
        rewrite ^/games/app/(.*)$ /index.html break;

        # Standard SPA fallback logic. The actual try_files should be against
        # the stripped path ($uri) plus the mandatory index.html file.
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets heavily for performance
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}