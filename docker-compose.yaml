version: '3.8'

services:
  symbiomes-builder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: symbiomes-builder-temp
    
    # Map the container's /app/dist folder to a new local folder named 'build_output'
    volumes:
      - ./build_output:/app/dist 
    
    # Run the container only to execute the build, then stop it immediately
    command: ["tail", "-f", "/dev/null"] 
    # The actual build command happens when the service is built (via Dockerfile RUN)